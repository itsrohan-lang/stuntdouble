<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>StuntDouble Desktop</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background-color: #0d1117;
        color: #c9d1d9;
        padding: 40px;
        text-align: center;
      }
      h1 { color: #58a6ff; }
      button {
        background-color: #238636;
        color: white;
        border: none;
        padding: 15px 30px;
        font-size: 16px;
        border-radius: 6px;
        cursor: pointer;
        margin-top: 20px;
      }
      button:hover { background-color: #2ea043; }
      #console {
        margin-top: 30px;
        background: #161b22;
        padding: 20px;
        border-radius: 6px;
        text-align: left;
        font-family: monospace;
        white-space: pre-wrap;
        min-height: 200px;
        color: #3fb950;
      }
    </style>
  </head>
  <body>
    <h1>StuntDouble Sandbox Manager</h1>
    <p>Run your autonomous agents securely without touching the command line.</p>
    
    <div>
      <input type="text" id="agentInput" value="claude" style="padding:10px; font-size:16px;" />
      <button id="startBtn">Launch Secure Sandbox</button>
    </div>

    <div id="console">Ready...</div>

    <script>
      const { ipcRenderer } = require('electron');

      document.getElementById('startBtn').addEventListener('click', () => {
        const agent = document.getElementById('agentInput').value;
        document.getElementById('console').innerText = `Spawning sandbox for ${agent}...\n`;
        ipcRenderer.send('start-sandbox', agent);
      });

      ipcRenderer.on('sandbox-status', (event, arg) => {
        document.getElementById('console').innerText += `\n${arg.output}\n`;
      });
    </script>
  </body>
</html>
