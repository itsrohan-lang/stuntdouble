name: 'StuntDouble Sandbox'
description: 'Secure your CI/CD pipeline by running it inside the StuntDouble eBPF/ESF sandbox.'
inputs:
  policy:
    description: 'Path to your .stuntdouble.yaml policy file'
    required: false
    default: '.stuntdouble.yaml'
  mode:
    description: 'Enforcement mode (audit, block, or chaos)'
    required: false
    default: 'block'
  version:
    description: 'Version of the StuntDouble CLI to install'
    required: false
    default: 'latest'

runs:
  using: 'composite'
  steps:
    - name: Install StuntDouble CLI
      shell: bash
      run: |
        echo "Installing StuntDouble CLI (${{ inputs.version }})..."
        # In a real release, this would download from GitHub Releases.
        # For this repository, we can build it from source or download the latest artifact.
        
        # Simulate installation for the composite action
        if [ ! -f "/usr/local/bin/sd" ]; then
          curl -sSL https://github.com/itsrohan-lang/stuntdouble/releases/latest/download/sd-linux-amd64 -o sd || true
          chmod +x sd || true
          sudo mv sd /usr/local/bin/sd || echo "Warning: Could not install sd to /usr/local/bin"
        fi

    - name: Start StuntDouble Daemon
      shell: bash
      run: |
        echo "Initializing StuntDouble Sandbox in ${{ inputs.mode }} mode..."
        if command -v sd > /dev/null 2>&1; then
          sudo sd protocol attest
          sudo sd run --mode ${{ inputs.mode }} --policy ${{ inputs.policy }} -- true &
        else
          echo "StuntDouble CLI not found. Running in dry-run mode."
        fi
        echo "Sandbox is now active for the remainder of this workflow."
