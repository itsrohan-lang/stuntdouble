name: Test Suite

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-go:
    name: Run Go Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        directory:
          - cli
          - control-plane
          - terraform-provider-stuntdouble
          - k8s-operator
          - wasm
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'
        
    - name: Run go test
      working-directory: ${{ matrix.directory }}
      run: |
        go mod tidy
        go test -v ./...

  test-node:
    name: Run Node/Next.js Build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: docs/package-lock.json
        
    - name: Test Docs Site Build
      working-directory: docs
      run: |
        npm ci
        npm run build
