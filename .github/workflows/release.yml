name: Release StuntDouble CLI

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & Release Binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
          - os: windows
            arch: amd64

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - name: Build Binary
        working-directory: ./cli
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          ext=""
          if [ "${{ matrix.os }}" = "windows" ]; then ext=".exe"; fi
          go build -ldflags="-s -w" -o stuntdouble-${{ matrix.os }}-${{ matrix.arch }}$ext main.go

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: cli/stuntdouble-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
