name: Release StuntDouble CLI

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build & Release All
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.22'

      - name: Build Binaries
        working-directory: ./cli
        run: |
          GOOS=linux GOARCH=amd64 go build -o stuntdouble-linux-amd64
          GOOS=darwin GOARCH=amd64 go build -o stuntdouble-darwin-amd64
          GOOS=darwin GOARCH=arm64 go build -o stuntdouble-darwin-arm64
          GOOS=windows GOARCH=amd64 go build -o stuntdouble-windows-amd64.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: cli/stuntdouble-*
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish CLI Wrapper to NPM
        working-directory: ./npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
