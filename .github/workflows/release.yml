name: Release StuntDouble CLI

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & Release Binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
          - os: windows
            arch: amd64

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version: '1.25.x'

      - name: Build Binary
        working-directory: ./cli
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          ext=""
          if [ "${{ matrix.os }}" = "windows" ]; then ext=".exe"; fi
          go build -ldflags="-s -w" -o stuntdouble-${{ matrix.os }}-${{ matrix.arch }}$ext main.go

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v3
        with:
          files: cli/stuntdouble-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  npm-publish:
    name: Publish VS Code Extension to NPM
    runs-on: ubuntu-latest
    needs: build-and-release
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install and Build Extension
        working-directory: ./vscode-extension
        run: |
          npm install
          npm run compile

      - name: Publish to NPM
        working-directory: ./vscode-extension
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
